<!DOCTYPE html>
<html lang="vi" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} — {{ app_config.shop_display_name }}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-full bg-slate-950 text-slate-100">
    <main class="mx-auto max-w-4xl px-4 py-10 sm:px-6 lg:px-8">
        <div class="mb-6 rounded-3xl border border-slate-800 bg-slate-900/80 p-6 shadow-2xl shadow-slate-950/30">
            <p class="text-xs font-semibold uppercase tracking-[0.24em] text-emerald-400">{{ app_config.shop_display_name }}</p>
            <h1 class="mt-3 text-3xl font-extrabold text-slate-100">{{ page_title }}</h1>
            <p class="mt-3 text-sm leading-6 text-slate-400">Trang thông tin công khai dùng chung cho bot và vận hành shop. Nội dung tại đây bám theo cấu hình hiện tại trong admin.</p>
            <div class="mt-5 flex flex-wrap gap-2 border-t border-slate-800 pt-4 sm:gap-3">
                <a href="/" class="rounded-xl border border-slate-700 px-3 py-2 text-sm font-semibold text-slate-200 hover:border-slate-600 hover:bg-slate-800 sm:px-4">Trang chủ</a>
                <a href="/store" class="rounded-xl border border-slate-700 px-3 py-2 text-sm font-semibold text-slate-200 hover:border-slate-600 hover:bg-slate-800 sm:px-4">Sản phẩm</a>
                <a href="/terms" class="rounded-xl border border-slate-700 px-3 py-2 text-sm font-semibold text-slate-200 hover:border-slate-600 hover:bg-slate-800 sm:px-4">Điều khoản mua hàng</a>
                <a href="/support-policy" class="rounded-xl border border-emerald-500/20 bg-emerald-500/10 px-3 py-2 text-sm font-semibold text-emerald-200 hover:border-emerald-400/40 hover:bg-emerald-500/15 sm:px-4">Hỗ trợ & hậu mãi</a>
            </div>
        </div>

        <div class="rounded-3xl border border-slate-800 bg-slate-900/60 p-6 sm:p-8">
            <article class="prose prose-invert max-w-3xl overflow-hidden break-words prose-p:text-slate-300 prose-li:text-slate-300 prose-strong:text-slate-100 prose-headings:text-slate-100 whitespace-pre-line">{{ content_html|safe }}</article>
        </div>

    </main>
</body>
</html>
